{{- if .Values.services.nexus.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.tenant_id }}-nexus
spec:
  replicas: {{ .Values.services.nexus.replicas | default 1 }}
  selector: { matchLabels: { app: nexus, tenant: {{ .Values.tenant_id }} } }
  template:
    metadata: { labels: { app: nexus, tenant: {{ .Values.tenant_id }} } }
    spec:
      containers:
      - name: oauth2-proxy
        image: quay.io/oauth2-proxy/oauth2-proxy:latest
        args:
        - --upstream=http://localhost:8081
        - --http-address=0.0.0.0:4180
        - --provider=oidc
        - --client-id={{ .Values.tenant_id }}-nexus
        - --oidc-issuer-url={{ .Values.platform.keycloak.public_url }}/realms/{{ .Values.platform.keycloak.realm }}
        - --redirect-url=http://nexus-{{ .Values.tenant_id }}.<YOUR_TAILSCALE_IP>.nip.io/oauth2/callback
        - --email-domain=*
        - --cookie-secure=false
        - --pass-user-headers=true
        - --set-xauthrequest=true
        - --allowed-group={{ .Values.access.groups.admins }}
        - --allowed-group={{ .Values.access.groups.users }}
        ports: [{ containerPort: 4180 }]
        env:
        - name: NEXUS_OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Values.platform.secrets.name | default (printf "%s-secrets" .Values.tenant_id) }}
              key: nexus-oidc-client-secret
        - name: OAUTH2_PROXY_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Values.platform.secrets.name | default (printf "%s-secrets" .Values.tenant_id) }}
              key: nexus-oidc-client-secret
        - name: OAUTH2_PROXY_COOKIE_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Values.platform.secrets.name | default (printf "%s-secrets" .Values.tenant_id) }}
              key: nexus-oauth2-proxy-cookie-secret
      - name: nexus
        image: sonatype/nexus3:latest
        ports: [{ containerPort: 8081 }]
        volumeMounts:
        - name: nexus-data
          mountPath: /nexus-data
        - name: vault-secrets
          mountPath: "/mnt/secrets"
          readOnly: true
      volumes:
      - name: nexus-data
        persistentVolumeClaim:
          claimName: {{ .Values.tenant_id }}-nexus-pvc
      - name: vault-secrets
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: "{{ .Values.tenant_id }}-vault-secrets"
{{- end }}
