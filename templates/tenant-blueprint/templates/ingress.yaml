apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.tenant_id }}-ingress
  namespace: {{ .Values.isolation.namespace }}
spec:
  ingressClassName: nginx
  rules:
    {{- if .Values.services.jenkins.enabled }}
    - host: jenkins-{{ .Values.tenant_id }}.<YOUR_TAILSCALE_IP>.nip.io
      http:
        paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: jenkins
              port:
                number: 8080
    {{- end }}
    {{- if .Values.services.gitlab.enabled }}
    - host: git-{{ .Values.tenant_id }}.<YOUR_TAILSCALE_IP>.nip.io
      http:
        paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: gitlab
              port:
                number: 80
    {{- end }}
    {{- if .Values.services.nexus.enabled }}
    - host: nexus-{{ .Values.tenant_id }}.<YOUR_TAILSCALE_IP>.nip.io
      http:
        paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: oauth2-proxy-nexus
              port:
                number: 4180
    {{- end }}
    {{- if .Values.services.sonarqube.enabled }}
    - host: sonar-{{ .Values.tenant_id }}.<YOUR_TAILSCALE_IP>.nip.io
      http:
        paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: {{ .Values.tenant_id }}-sonarqube
              port:
                number: 9000
    {{- end }}
